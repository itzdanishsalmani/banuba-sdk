buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

ext {
  bnb_sdk_version = "1.38.0"
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    maven {                                    // ← Banuba LAST
      name = "banuba"
      url = uri("https://artifactory.banuba.net/artifactory/banuba-sdk-android/")
      credentials {
        username = findProperty("BANUBA_USERNAME") ?: System.getenv("BANUBA_USERNAME")
        password = findProperty("BANUBA_PASSWORD") ?: System.getenv("BANUBA_PASSWORD")
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"